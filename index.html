<style>
  :root{
    --bg:#0f1117;
    --bg-2:#161923;
    --line:#252a38;
    --accent:#6c8cff;
    --accent-2:#9f7cff;
    --text:#e8eaf2;
    --muted:#8b90a3;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  h1,h2,h3{font-family:'Sora',sans-serif;line-height:1.15}

  .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s}
  .reveal.visible{opacity:1;transform:none}
  .reveal.d1{transition-delay:.1s}.reveal.d2{transition-delay:.2s}.reveal.d3{transition-delay:.3s}

  header{position:fixed;inset:0 0 auto 0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 5%;background:rgba(15,17,23,.85);backdrop-filter:blur(12px);border-bottom:1px solid transparent;transition:.3s}
  header.scrolled{border-color:var(--line)}
  .logo{font-family:'Sora',sans-serif;font-weight:800;font-size:1.25rem}
  .logo span{background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .lang{display:flex;gap:3px;border:1px solid var(--line);border-radius:100px;padding:3px}
  .lang button{background:none;border:none;color:var(--muted);font-family:inherit;font-size:.78rem;font-weight:700;padding:5px 11px;border-radius:100px;cursor:pointer;transition:.25s}
  .lang button.active{background:var(--accent);color:#0f1117}

  .hero{min-height:72vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;padding:130px 5% 70px;overflow:hidden}
  .hero::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(108,140,255,.16),transparent 65%);top:-260px;left:50%;transform:translateX(-50%)}
  .hero-inner{max-width:760px;position:relative}
  .hero .kicker{display:inline-block;border:1px solid var(--line);background:var(--bg-2);border-radius:100px;padding:7px 18px;font-size:.83rem;font-weight:600;color:var(--muted);margin-bottom:26px}
  .hero .kicker b{color:var(--accent)}
  .hero h1{font-size:clamp(2.4rem,6vw,4rem);font-weight:800;margin-bottom:22px}
  .hero h1 span{background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--muted);font-size:1.12rem;max-width:560px;margin:0 auto 34px}
  .btn{display:inline-block;background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#0f1117;padding:14px 34px;border-radius:100px;font-weight:700;font-size:1rem;transition:.3s;border:none;cursor:pointer}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 34px rgba(108,140,255,.35)}

  section{padding:80px 5%}
  .wrap{max-width:1150px;margin:0 auto}
  .head{text-align:center;max-width:620px;margin:0 auto 56px}
  .head h2{font-size:clamp(1.8rem,3.6vw,2.6rem);font-weight:700;margin-bottom:12px}
  .head p{color:var(--muted)}

  .works{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:26px}
  .work{background:var(--bg-2);border:1px solid var(--line);border-radius:22px;overflow:hidden;transition:.35s;display:flex;flex-direction:column}
  .work:hover{transform:translateY(-8px);border-color:var(--accent);box-shadow:0 24px 60px rgba(0,0,0,.45)}
  .work .thumb{aspect-ratio:16/10;overflow:hidden;position:relative}
  .work .thumb img{width:100%;height:100%;object-fit:cover;transition:.5s}
  .work:hover .thumb img{transform:scale(1.06)}
  .work .thumb .type{position:absolute;top:14px;left:14px;background:rgba(15,17,23,.85);backdrop-filter:blur(6px);border:1px solid var(--line);color:var(--text);font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 13px;border-radius:100px}
  .work .body{padding:24px;display:flex;flex-direction:column;flex:1}
  .work h3{font-size:1.3rem;font-weight:700;margin-bottom:8px}
  .work p{color:var(--muted);font-size:.94rem;margin-bottom:16px;flex:1}
  .feats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .feats span{background:rgba(108,140,255,.1);border:1px solid rgba(108,140,255,.25);color:#aebfff;font-size:.76rem;font-weight:600;padding:4px 12px;border-radius:100px}
  .work .open{display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid var(--accent);color:var(--accent);border-radius:100px;padding:11px;font-weight:700;font-size:.94rem;transition:.3s}
  .work .open:hover{background:var(--accent);color:#0f1117}
  .work.featured{border:1.5px solid transparent;background:linear-gradient(var(--bg-2),var(--bg-2)) padding-box,linear-gradient(120deg,var(--accent),var(--accent-2)) border-box}
  .work .flag{position:absolute;top:14px;right:14px;background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#0f1117;font-size:.72rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:6px 12px;border-radius:100px}
  .feats span.tech{background:rgba(159,124,255,.12);border-color:rgba(159,124,255,.3);color:#c9b6ff}

  .why{background:var(--bg-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
  .why-card{background:var(--bg);border:1px solid var(--line);border-radius:18px;padding:30px 24px;text-align:center}
  .why-card .ic{font-size:1.9rem;margin-bottom:12px}

  .cta p{color:var(--muted);max-width:520px;margin:0 auto 30px}

  footer{border-top:1px solid var(--line);text-align:center;padding:30px 5%;color:var(--muted);font-size:.88rem}

let lang = localStorage.getItem('aw-lang') || 'ro';
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

function applyLang(){
  const d = T[lang];
  $$('[data-i18n]').forEach(el => { const v = d[el.dataset.i18n]; if (typeof v === 'string') el.textContent = v; });
  $$('[data-i18n-html]').forEach(el => { const v = d[el.dataset.i18nHtml]; if (v) el.innerHTML = v; });
  $$('#langSwitch button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.documentElement.lang = lang;
}
$$('#langSwitch button').forEach(b => b.onclick = () => { lang = b.dataset.lang; localStorage.setItem('aw-lang', lang); applyLang(); });

const header = $('#header');
addEventListener('scroll', () => header.classList.toggle('scrolled', scrollY > 40));
const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target);} }), {threshold:.12});
$$('.reveal:not(.visible)').forEach(el => io.observe(el));
