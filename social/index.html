<!doctype html>
<html lang="ro"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Social Media Design — Alexandru Macovetchi</title>
<style>
  :root{--navy:#1c3f60;--navy-d:#14304a;--ink:#1e2530;--muted:#5b6673;--bg:#f3f4f1;--accent:#b5822a;--line:#e2e5e2}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI",system-ui,sans-serif;line-height:1.55}
  .head{background:linear-gradient(135deg,var(--navy-d),var(--navy));color:#fff;padding:56px 24px;text-align:center}
  .head .ey{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#e9c98a;font-weight:700}
  .head h1{margin:10px 0 8px;font-size:clamp(28px,5vw,40px);font-weight:800;letter-spacing:-.01em}
  .head p{margin:0 auto;max-width:560px;color:#cddbe9;font-size:15px}
  .wrap{max-width:1000px;margin:0 auto;padding:40px 20px 70px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:26px}
  @media(max-width:720px){.grid{grid-template-columns:1fr}}
  figure{margin:0;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(20,30,45,.06)}
  figure img{display:block;width:100%;height:auto}
  figcaption{padding:14px 18px}
  figcaption b{display:block;font-size:15px}
  figcaption span{font-size:13px;color:var(--muted)}
  .foot{text-align:center;margin-top:44px;color:var(--muted);font-size:14px}
  .foot a{color:var(--accent);text-decoration:none;font-weight:600}
</style></head>
<body>
  <header class="head">
    <div class="ey">Portofoliu · Social Media Design</div>
    <h1>Alexandru Macovetchi</h1>
    <p>Creez conținut vizual pentru Instagram: postări curate, pe brand, care atrag atenția și aduc comenzi. Mai jos, câteva mostre pe stiluri diferite.</p>
  </header>
  <div class="wrap">
    <div class="grid">
      <figure><img src="mi-spf.png" alt="Postare SPF — MI Cosmetics">
        <figcaption><b>Cosmetice · Noutăți SPF</b><span>Stil elegant, bordo &amp; auriu</span></figcaption></figure>
      <figure><img src="lume-serum.png" alt="Postare ser — skincare">
        <figcaption><b>Skincare · Lansare produs</b><span>Stil minimal, curat</span></figcaption></figure>
      <figure><img src="noir-parfum.png" alt="Postare parfum — colecție">
        <figcaption><b>Parfumerie · Colecție</b><span>Stil luxury, negru &amp; auriu</span></figcaption></figure>
      <figure><img src="glow-oferta.png" alt="Postare ofertă — machiaj">
        <figcaption><b>Machiaj · Ofertă</b><span>Stil bold, promoțional</span></figcaption></figure>
    </div>
    <p class="foot">Vrei conținut pentru brandul tău? ✉️ alexmacovetchi23@gmail.com &nbsp;·&nbsp; <a href="https://alex-macovetch1.github.io/portofoliu/">Portofoliu web</a></p>
  </div>
</body></html>
