<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valea Verde — Pensiune & Cabane la munte</title>
<meta name="description" content="Pensiune cu cabane din lemn, ciubăr cu apă caldă și natură cât vezi cu ochii. Rezervă direct, fără comisioane.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Karla:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f4ee;
    --bg-2:#efe9df;
    --green:#3f5d45;
    --green-dark:#2e4634;
    --wood:#b07d4f;
    --ink:#2c2a25;
    --muted:#6f6a5e;
    --white:#fff;
    --shadow:0 18px 50px rgba(46,70,52,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Karla',sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;overflow-x:hidden}
  img{max-width:100%;display:block}
  a{color:inherit;text-decoration:none}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;line-height:1.15}

  .reveal{opacity:0;transform:translateY(30px);transition:opacity .8s,transform .8s}
  .reveal.visible{opacity:1;transform:none}
  .reveal.d1{transition-delay:.12s}.reveal.d2{transition-delay:.24s}.reveal.d3{transition-delay:.36s}

  /* Header */
  header{position:fixed;inset:0 0 auto 0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 5%;transition:.35s}
  header.scrolled{background:rgba(247,244,238,.94);backdrop-filter:blur(12px);box-shadow:0 3px 24px rgba(46,70,52,.1);padding:11px 5%}
  .logo{font-family:'Fraunces',serif;font-size:1.45rem;font-weight:600;color:#fff;display:flex;align-items:center;gap:9px;transition:.3s}
  .logo svg{width:30px;height:30px;fill:none;stroke:currentColor;stroke-width:1.6}
  header.scrolled .logo{color:var(--green-dark)}
  nav{display:flex;gap:28px;align-items:center}
  nav a{font-size:.93rem;font-weight:600;letter-spacing:.04em;color:rgba(255,255,255,.9);transition:.25s}
  header.scrolled nav a{color:var(--muted)}
  nav a:hover{color:var(--wood)}
  .lang{display:flex;gap:3px;border:1px solid rgba(255,255,255,.4);border-radius:100px;padding:3px;transition:.3s}
  header.scrolled .lang{border-color:#d8d0c2}
  .lang button{background:none;border:none;color:rgba(255,255,255,.85);font-family:inherit;font-size:.78rem;font-weight:700;padding:5px 10px;border-radius:100px;cursor:pointer;transition:.25s}
  header.scrolled .lang button{color:var(--muted)}
  .lang button.active{background:var(--wood);color:#fff !important}
  .btn{display:inline-block;background:var(--green);color:#fff !important;padding:13px 30px;border-radius:100px;font-weight:700;font-size:.95rem;letter-spacing:.03em;border:none;cursor:pointer;transition:.3s}
  .btn:hover{background:var(--green-dark);transform:translateY(-2px);box-shadow:0 10px 24px rgba(46,70,52,.35)}
  .btn.wood{background:var(--wood)}
  .btn.wood:hover{background:#96683f}
  .burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;z-index:120}
  .burger span{width:26px;height:2px;background:#fff;transition:.3s}
  header.scrolled .burger span{background:var(--ink)}

  /* Hero */
  .hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;
    background:linear-gradient(rgba(28,42,32,.45),rgba(28,42,32,.55)),url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=1920&q=80') center/cover}
  .hero-inner{max-width:800px;padding:0 24px;color:#fff}
  .hero .kicker{letter-spacing:.4em;text-transform:uppercase;font-size:.82rem;font-weight:700;color:#e9d9a8;margin-bottom:20px}
  .hero h1{font-size:clamp(2.7rem,6.5vw,4.8rem);color:#fff;margin-bottom:22px}
  .hero h1 em{font-style:italic;color:#e9d9a8}
  .hero p{font-size:1.15rem;color:rgba(255,255,255,.88);font-weight:300;max-width:540px;margin:0 auto 36px}
  .hero-cta{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  .btn-ghost{display:inline-block;padding:12px 28px;border-radius:100px;border:1.5px solid rgba(255,255,255,.65);color:#fff;font-weight:700;font-size:.95rem;transition:.3s}
  .btn-ghost:hover{background:#fff;color:var(--green-dark);border-color:#fff}

  /* Quick facts */
  .facts{background:var(--green-dark);color:#fff;display:grid;grid-template-columns:repeat(4,1fr);text-align:center;padding:40px 5%}
  .facts h3{font-size:1.9rem;color:#e9d9a8;margin-bottom:2px}
  .facts p{font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.7)}

  section{padding:105px 5%}
  .wrap{max-width:1180px;margin:0 auto}
  .head{text-align:center;max-width:620px;margin:0 auto 64px}
  .head .kicker{letter-spacing:.38em;text-transform:uppercase;font-size:.78rem;color:var(--wood);font-weight:700;display:block;margin-bottom:12px}
  .head h2{font-size:clamp(2rem,4vw,2.9rem);color:var(--green-dark)}
  .head p{color:var(--muted);margin-top:14px}

  /* About */
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;max-width:1180px;margin:0 auto}
  .about-imgs{position:relative;padding-bottom:70px}
  .about-imgs img:first-child{border-radius:18px;width:82%}
  .about-imgs img:last-child{position:absolute;right:0;bottom:0;width:52%;border-radius:18px;border:6px solid var(--bg);box-shadow:var(--shadow)}
  .about-grid h2{font-size:clamp(1.9rem,3.5vw,2.7rem);color:var(--green-dark);margin-bottom:20px}
  .about-grid .kicker{letter-spacing:.38em;text-transform:uppercase;font-size:.78rem;color:var(--wood);font-weight:700;display:block;margin-bottom:12px}
  .about-grid p{color:var(--muted);margin-bottom:16px}

  /* Cabins */
  .cabins{background:var(--bg-2)}
  .cabin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:26px}
  .cabin{background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 8px 30px rgba(46,70,52,.08);transition:.35s}
  .cabin:hover{transform:translateY(-8px);box-shadow:var(--shadow)}
  .cabin img{height:230px;width:100%;object-fit:cover}
  .cabin .body{padding:26px}
  .cabin h3{font-size:1.4rem;color:var(--green-dark);margin-bottom:6px}
  .cabin .cap{color:var(--wood);font-size:.9rem;font-weight:700;letter-spacing:.05em;margin-bottom:12px}
  .cabin p{color:var(--muted);font-size:.95rem;margin-bottom:16px}
  .cabin .foot{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #eee7da;padding-top:16px}
  .cabin .price{font-family:'Fraunces',serif;font-size:1.35rem;color:var(--green-dark)}
  .cabin .price small{font-family:'Karla',sans-serif;font-size:.82rem;color:var(--muted)}
  .cabin .foot a{color:var(--wood);font-weight:700;font-size:.92rem}

  /* Facilities */
  .fac-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px}
  .fac{background:var(--white);border-radius:16px;padding:30px 22px;text-align:center;box-shadow:0 5px 20px rgba(46,70,52,.06);transition:.3s}
  .fac:hover{transform:translateY(-5px)}
  .fac .ic{font-size:2rem;margin-bottom:12px}
  .fac h3{font-size:1.05rem;color:var(--green-dark);margin-bottom:6px;font-family:'Karla',sans-serif;font-weight:700}
  .fac p{color:var(--muted);font-size:.88rem}

  /* Gallery */
  .gal{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
  .gal figure{overflow:hidden;border-radius:16px;aspect-ratio:4/3}
  .gal img{width:100%;height:100%;object-fit:cover;transition:.6s}
  .gal figure:hover img{transform:scale(1.09)}

  /* Booking */
  .booking{background:linear-gradient(rgba(28,42,32,.82),rgba(28,42,32,.88)),url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=1600&q=70') center/cover}
  .booking .head h2,.booking .head .kicker{color:#fff}
  .booking .head .kicker{color:#e9d9a8}
  .booking .head p{color:rgba(255,255,255,.75)}
  .book-card{max-width:680px;margin:0 auto;background:var(--white);border-radius:22px;padding:42px;box-shadow:0 30px 80px rgba(0,0,0,.35)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:7px}
  .field input,.field select{width:100%;padding:13px 15px;border:1.5px solid #e2dccd;border-radius:12px;font-family:inherit;font-size:1rem;background:var(--bg);color:var(--ink);transition:.25s}
  .field input:focus,.field select:focus{outline:none;border-color:var(--green)}
  .calc{background:var(--bg-2);border-radius:14px;padding:18px 20px;margin:6px 0 18px;display:none}
  .calc.on{display:block}
  .calc div{display:flex;justify-content:space-between;padding:5px 0;font-size:.97rem}
  .calc div span{color:var(--muted)}
  .calc div.total{border-top:1.5px solid #ddd3c0;margin-top:8px;padding-top:10px;font-weight:700}
  .calc div.total b{color:var(--green-dark);font-size:1.15rem}
  .book-card .btn{width:100%;padding:15px;font-size:1.02rem}
  .book-card .alt{text-align:center;margin-top:14px;font-size:.92rem;color:var(--muted)}
  .book-card .alt a{color:var(--wood);font-weight:700}

  /* Reviews */
  .rev-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px}
  .rev{background:var(--white);border-radius:18px;padding:32px;box-shadow:0 6px 24px rgba(46,70,52,.07)}
  .rev .stars{color:#e0a83a;letter-spacing:4px;margin-bottom:14px}
  .rev p{color:var(--muted);font-style:italic;margin-bottom:18px}
  .rev b{color:var(--green-dark)}
  .rev small{display:block;color:var(--muted)}

  /* Contact */
  .contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px;text-align:center}
  .c-card{background:var(--white);border-radius:18px;padding:34px 22px;box-shadow:0 6px 24px rgba(46,70,52,.06)}
  .c-card .ic{font-size:1.8rem;margin-bottom:12px}
  .c-card h3{font-size:1.05rem;color:var(--green-dark);margin-bottom:6px;font-family:'Karla',sans-serif;font-weight:700}
  .c-card p{color:var(--muted);font-size:.95rem}

  footer{background:var(--green-dark);color:rgba(255,255,255,.65);text-align:center;padding:32px 5%;font-size:.9rem}
  footer .logo{color:#fff;justify-content:center;margin-bottom:6px}

  .wa-float{position:fixed;right:22px;bottom:22px;width:56px;height:56px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 26px rgba(37,211,102,.4);z-index:90;transition:.3s}
  .wa-float:hover{transform:scale(1.1)}
  .wa-float svg{width:28px;height:28px;fill:#fff}

  @media(max-width:900px){
    .about-grid{grid-template-columns:1fr;gap:50px}
    .facts{grid-template-columns:repeat(2,1fr);gap:26px 0}
    .row2{grid-template-columns:1fr}
    .book-card{padding:30px 22px}
  }
  @media(max-width:760px){
    nav{position:fixed;inset:0;background:rgba(28,42,32,.97);flex-direction:column;justify-content:center;gap:26px;transform:translateX(100%);transition:.4s}
    nav.open{transform:none}
    nav a{color:#fff !important;font-size:1.2rem}
    .burger{display:flex}
    section{padding:78px 5%}
  }
</style>
</head>

const PRICES = [900, 1400, 2200];
let lang = localStorage.getItem('vv-lang') || 'ro';

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

function applyLang(){
  const d = T[lang];
  $$('[data-i18n]').forEach(el => { const v = d[el.dataset.i18n]; if (typeof v === 'string') el.textContent = v; });
  $$('[data-i18n-html]').forEach(el => { const v = d[el.dataset.i18nHtml]; if (v) el.innerHTML = v; });
  $$('#langSwitch button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  $$('#bCabin option').forEach((o,i) => o.textContent = d.cab_names[i]);
  document.documentElement.lang = lang;
  calc();
}

function nightsBetween(a, b){
  const ms = new Date(b) - new Date(a);
  return Math.round(ms / 86400000);
}
function calc(){
  const inD = $('#bIn').value, outD = $('#bOut').value;
  const box = $('#calc');
  const n = (inD && outD) ? nightsBetween(inD, outD) : 0;
  if (n > 0){
    const i = +$('#bCabin').value;
    box.classList.add('on');
    $('#cNights').textContent = n;
    $('#cCabin').textContent = T[lang].cab_names[i];
    $('#cTotal').textContent = (n * PRICES[i]).toLocaleString('ro-RO') + ' lei';
  } else box.classList.remove('on');
}
['bIn','bOut','bCabin'].forEach(id => $('#'+id).addEventListener('change', calc));

$('#bSend').onclick = () => {
  const d = T[lang];
  const inD = $('#bIn').value, outD = $('#bOut').value;
  const n = (inD && outD) ? nightsBetween(inD, outD) : 0;
  if (n < 1) { alert(d.alert_dates); return; }
  const name = $('#bName').value.trim();
  if (!name) { alert(d.alert_name); return; }
  const i = +$('#bCabin').value;
  const msg = d.wa_msg(inD, outD, d.cab_names[i], $('#bGuests').value, name, n, (n * PRICES[i]).toLocaleString('ro-RO'));
  open(`https://wa.me/37360123456?text=${encodeURIComponent(msg)}`, '_blank');
};

// date defaults: today + tomorrow
const t0 = new Date(), t1 = new Date(Date.now() + 86400000);
const iso = d => d.toISOString().split('T')[0];
$('#bIn').min = iso(t0); $('#bOut').min = iso(t1);

// lang switch
$$('#langSwitch button').forEach(b => b.onclick = () => { lang = b.dataset.lang; localStorage.setItem('vv-lang', lang); applyLang(); });

// header + menu + reveal
const header = $('#header');
addEventListener('scroll', () => header.classList.toggle('scrolled', scrollY > 60));
const nav = $('#nav');
$('#burger').onclick = () => nav.classList.toggle('open');
$$('#nav a').forEach(a => a.onclick = () => nav.classList.remove('open'));
const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target);} }), {threshold:.13});
$$('.reveal:not(.visible)').forEach(el => io.observe(el));

applyLang();
</script>
